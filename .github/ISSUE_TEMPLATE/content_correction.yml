name: Content correction or removal
description: Report incorrect metadata, a broken document, or a rights concern.
title: "[Content]: "
body:
  - type: input
    id: page
    attributes:
      label: Page or file URL
      placeholder: https://www.iabacu.ro/...
    validations:
      required: true
  - type: dropdown
    id: kind
    attributes:
      label: Request type
      options:
        - Incorrect metadata
        - Broken or mismatched document
        - Attribution or provenance
        - Rights or removal request
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details
      description: Describe the correction and include a reliable source when possible.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Supporting source
      description: Add official or otherwise reliable URLs. Do not post private identity documents.
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues for this document or correction.
          required: true
