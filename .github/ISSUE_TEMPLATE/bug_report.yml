name: Bug report
description: Report a reproducible problem in iabacu.
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve iabacu. Do not report security vulnerabilities here.
  - type: input
    id: page
    attributes:
      label: Affected page or file
      placeholder: https://www.iabacu.ro/...
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Explain the problem and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: "1. Open ...\n2. Select ...\n3. Observe ..."
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser and device
      placeholder: Firefox 128, Windows 11
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues for this problem.
          required: true
        - label: This report does not contain credentials, personal data, or a security vulnerability.
          required: true
