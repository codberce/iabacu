version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 2
    groups:
      react-runtime:
        patterns:
          - react
          - react-dom
      routine-updates:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      # Major upgrades need coordinated compatibility work and explicit review.
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
